# Reusable: TOC semver bump + tag push (invoked from release.yml on workflow_dispatch).
name: Bump version

on:
  workflow_call:
    inputs:
      bump:
        description: patch, minor, major, or skip (see release workflow)
        required: true
        type: string
    outputs:
      tag:
        description: Git tag vX.Y.Z written by the bump step
        value: ${{ jobs.bump.outputs.tag }}

permissions:
  contents: write

jobs:
  bump:
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.bump.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version or tag from TOC
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          BRANCH: ${{ github.ref_name }}
          TOC: DownToDarkmoon.toc
        run: bash .github/scripts/bump-version-from-toc.sh

      - name: Summary
        env:
          BUMP: ${{ inputs.bump }}
          OUT_VERSION: ${{ steps.bump.outputs.version }}
          OUT_TAG: ${{ steps.bump.outputs.tag }}
          OUT_PREVIOUS: ${{ steps.bump.outputs.previous }}
        run: bash .github/scripts/bump-job-summary.sh
