# Packages and publishes with BigWigsMods/packager (WoW Packager action).
#
# Scripts: .github/scripts/bump-version-from-toc.sh, bump-job-summary.sh
#
# Triggers:
#   • workflow_dispatch — bump TOC semver (patch/minor/major) **or** skip bump and release the
#     current ## Version (tag vX.Y.Z is created if missing, or moved to HEAD if it already exists).
#     Then package in the same run.
#   • push tags — package only (e.g. manual: git tag -a v1.0.1 -m "1.0.1" && git push origin v1.0.1).
#
# Tag pushes from this workflow’s bump step use github-actions[bot]; the package job is skipped for
# those events so the dispatch run doesn’t double-publish. Human-pushed tags still release.
#
# Secrets:
#   CF_API_KEY       — CurseForge API token (upload + localization). Repo Settings → Secrets.
# GitHub Releases use GITHUB_TOKEN (no extra secret).
# Optional later: WOWI_API_TOKEN, WAGO_API_TOKEN for other hosts.
#
# CurseForge project id: ## X-Curse-Project-ID in DownToDarkmoon.toc, or packager -p <id>
#
# If branch protection blocks pushes from Actions, allow github-actions[bot] or use a PAT on checkout.
#
# No run-name: GitHub sets the run title from the event (e.g. commit message on push). See
# https://docs.github.com/en/actions/reference/workflows-and-actions/workflow-syntax#run-name
name: Release

on:
  workflow_dispatch:
    inputs:
      bump:
        description: >
          Semver bump for TOC ## Version, or "skip" to keep the current version and ensure tag vX.Y.Z
          on HEAD (creates the tag or force-moves it to the current commit).
        required: true
        type: choice
        default: patch
        options:
          - patch
          - minor
          - major
          - skip
  push:
    tags:
      - "*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

jobs:
  bump:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.bump.outputs.version }}
      tag: ${{ steps.bump.outputs.tag }}
      previous: ${{ steps.bump.outputs.previous }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Bump version or tag from TOC
        id: bump
        env:
          BUMP: ${{ inputs.bump }}
          BRANCH: ${{ github.ref_name }}
          TOC: DownToDarkmoon.toc
        run: bash .github/scripts/bump-version-from-toc.sh

      - name: Summary
        env:
          BUMP: ${{ inputs.bump }}
          OUT_VERSION: ${{ steps.bump.outputs.version }}
          OUT_TAG: ${{ steps.bump.outputs.tag }}
          OUT_PREVIOUS: ${{ steps.bump.outputs.previous }}
        run: bash .github/scripts/bump-job-summary.sh

  package:
    needs: bump
    if: >
      !cancelled() &&
      (
        (github.event_name == 'workflow_dispatch' && needs.bump.result == 'success') ||
        (
          github.event_name == 'push' &&
          needs.bump.result == 'skipped' &&
          github.actor != 'github-actions[bot]'
        )
      )
    runs-on: ubuntu-latest
    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          # After bump, default ref would still be pre-push SHA; checkout the new tag instead.
          ref: ${{ github.event_name == 'workflow_dispatch' && needs.bump.outputs.tag || github.ref }}

      - name: Build release metadata
        id: release_meta
        shell: bash
        env:
          EVENT_NAME: ${{ github.event_name }}
          INPUT_BUMP: ${{ inputs.bump }}
          BUMP_VERSION: ${{ needs.bump.outputs.version }}
          BUMP_TAG: ${{ needs.bump.outputs.tag }}
          BUMP_PREVIOUS: ${{ needs.bump.outputs.previous }}
          PUSH_TAG_REF: ${{ github.ref_name }}
        run: |
          set -euo pipefail

          if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
            VERSION="$BUMP_VERSION"
            TAG="$BUMP_TAG"
            PREVIOUS="$BUMP_PREVIOUS"
            BUMP_KIND="$INPUT_BUMP"
          else
            TAG="$PUSH_TAG_REF"
            VERSION="${TAG#v}"
            PREVIOUS=""
            BUMP_KIND="push-tag"
          fi

          TITLE="Release ${VERSION}"
          NOTES_FILE="$RUNNER_TEMP/release-notes.md"

          {
            echo "## Release ${VERSION}"
            echo ""
            if [[ "$EVENT_NAME" == "workflow_dispatch" ]]; then
              if [[ "$BUMP_KIND" == "skip" ]]; then
                echo "### Release from existing TOC version"
                echo ""
                echo "- **TOC version:** ${VERSION}"
                echo "- **Tag:** \`${TAG}\`"
              else
                echo "### Version bump"
                echo ""
                echo "- **Previous:** ${PREVIOUS}"
                echo "- **New:** ${VERSION}"
                echo "- **Tag:** \`${TAG}\`"
                echo "- **Bump type:** ${BUMP_KIND}"
              fi
            else
              echo "### Release from tag push"
              echo ""
              echo "- **Tag:** \`${TAG}\`"
              echo "- **Version:** ${VERSION}"
            fi
          } > "$NOTES_FILE"

          {
            echo "title=${TITLE}"
            echo "tag=${TAG}"
            echo "notes_file=${NOTES_FILE}"
          } >> "$GITHUB_OUTPUT"

      - name: Package and publish
        uses: BigWigsMods/packager@v2

      - name: Update GitHub release title and notes
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_TAG: ${{ steps.release_meta.outputs.tag }}
          RELEASE_TITLE: ${{ steps.release_meta.outputs.title }}
          RELEASE_NOTES_FILE: ${{ steps.release_meta.outputs.notes_file }}
        run: |
          set -euo pipefail
          gh release edit "$RELEASE_TAG" \
            --title "$RELEASE_TITLE" \
            --notes-file "$RELEASE_NOTES_FILE"
