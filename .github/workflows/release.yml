# Publishes zips using BigWigsMods/packager (WoW Packager action).
# Version comes from the Git tag. To bump DownToDarkmoon.toc semver and tag in one step, run the
# "Bump version and tag" workflow (Actions → workflow_dispatch). Or manually:
#   git tag -a v1.0.1 -m "1.0.1" && git push origin v1.0.1
#
# Secrets:
#   CF_API_KEY       — CurseForge API token (upload + localization). Add in repo Settings → Secrets.
# GitHub Releases use the automatic GITHUB_TOKEN (no extra secret).
# Optional later: WOWI_API_TOKEN, WAGO_API_TOKEN for other hosts.
#
# CurseForge project id: ## X-Curse-Project-ID: <id> in DownToDarkmoon.toc, or packager args: -p <id>
name: Release

on:
  push:
    tags:
      - "*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    env:
      CF_API_KEY: ${{ secrets.CF_API_KEY }}
      GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Package and publish
        uses: BigWigsMods/packager@v2
